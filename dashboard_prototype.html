<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!--Get chart.js library-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <title>Yorkshire Peat Partnership Data Dashboard</title>
</head>

<style>
  body {
    margin: 0;
    padding: 0;
    background-color: rgb(255, 254, 226);
  }

  #top {
    border: black 1px solid;
    background-color: rgba(132, 174, 194, 1);
    width: 100%;
    height: 100px;
    margin:0;
    padding: 0;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    }
  
  #nav_bar {
    border: black 1px solid;
    background-color: rgb(100, 64, 16);
    width: 100%;
    height: 30px;
    margin:0;
    padding: 0;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    }

  #main_panel {
    border: black 1px solid;
    background-color: rgba(164, 226, 218, 1);
    width: 100%;
    margin:0;
    padding: 0;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    }

  #chart_container {
    border: black 1px solid;
    background-color: rgb(250, 255, 239);
    width: 100%;
    height: 300px;
    margin:0;
    padding: 0;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    }

  
</style>

<body>
    <div id="top">YPP Data</div>
    
    <br>

    <div id="nav_bar">
      <nav><!--Navigation buttons-->
        <button onclick="showPanel('one', this)">One</button>
        <button onclick="showPanel('two', this)">Two</button>
        <button onclick="showPanel('three', this)">Three</button>
        <button onclick="showPanel('four', this)">Four</button>
      </nav>
    </div>

    <br>
    <br>

    <div id="main_panel"><!--Main display panel-->
        
        <div id="one"> <!--Panel 1 contents-->
            <div id="chart_container"><canvas id="myChart"></canvas></div>
            <br>
            <div id="chart_container"><canvas id="myChart2"></canvas></div>
        </div>

        <div id="two" style="display:none">Content for panel two</div>
        
        <div id="three" style="display:none">Content for panel three</div>
        
        <div id="four" style="display:none">Content for panel four</div>
    </div>

  <script>
    //Function to reveal panels
    function showPanel(id, btn) {
      document.querySelectorAll('#main_panel > div').forEach(d => d.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }
  </script>

    <script>
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
        labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
        datasets: [{
            label: '# of Votes',
            data: [12, 19, 3, 5, 2, 3],
            borderWidth: 1
        }]
        },
        options: {
        scales: {
            y: {
            beginAtZero: true
            }
        }
        }
    });
    </script>

    <script>
    const ctx2 = document.getElementById('myChart2');

    new Chart(ctx2, {
        type: 'bar',
        data: {
        labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
        datasets: [{
            label: '# of Votes',
            data: [12, 19, 3, 5, 2, 3],
            borderWidth: 1
        }]
        },
        options: {
        scales: {
            y: {
            beginAtZero: true
            }
        }
        }
    });
    </script>

</body>
</html>
