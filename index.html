<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!--Get chart.js library-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--Load in font-->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    
    <title>Yorkshire Peat Partnership Data Dashboard</title>
</head>

<style>
  body {
    margin: 0;
    padding: 0;
    background-color: rgba(246, 246, 230, 1);
    font-family: 'Roboto Slab', serif;
  }

  #brand_bar {
    border: black 1px;
    background-color: rgba(132, 174, 194, 1);
    width: 100%;
    height: 100px;
    margin:0;
    padding: 0;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    position: relative;
    font-size: 40pt;
    color: rgba(255, 255, 255, 1);
    background: linear-gradient(to bottom, rgb(220, 255, 255), rgb(132, 174, 194));
    text-shadow: 5px 5px 5px rgba(0, 0, 0, 0.5);
    }
  
  #ypp_logo{
    height: 90px;
    position: absolute;
    right: 5px;
  }
  
  #nav_bar {
    border: black 1px solid;
    background-color: rgb(63, 57, 59);
    width: 100%;
    height: 30px;
    margin:0;
    padding: 0;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    position: sticky;
    top: 0;
    }

  .button {
    font-family: 'Roboto Slab', serif;
    font-size: 12px;
    padding: 0.5em 2em;
    border: transparent;
    box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    background: dodgerblue;
    color: white;
    border-radius: 4px;
    }

  .button:hover {
    background: rgb(2,0,36);
    background: linear-gradient(90deg, rgba(30,144,255,1) 0%, rgba(0,212,255,1) 100%);
    }

  .button:active {
    transform: translate(0em, 0.2em);
    }

  #main_panel {
    border: black 1px ;
    background-color: rgba(246, 246, 230, 1);
    width: 100%;
    margin: 0px;
    padding: 0px;
    display: block;
    }

  .chart_container {
    border: rgb(110, 90, 33) 1px solid;
    background-color: rgb(255, 255, 255);
    width: 70%;
    margin: 20px auto;
    padding: 20px;
    max-height: 500px;
    }
    
  .chart_container canvas {
    width: 100% !important;
    height: 100% !important;
    max-height: 500px;
    }

  
</style>

<body>
    <div id="brand_bar">YPP Data Dashboard
      <img src = "ypp_logo.jpg" id="ypp_logo"><img>
    </div>
    
    <br>

    <div id="nav_bar">
      <nav><!--Navigation buttons-->
        <button class = 'button' onclick="showPanel('one', this)">One</button>
        <button class = 'button' onclick="showPanel('two', this)">Two</button>
        <button class = 'button' onclick="showPanel('three', this)">Three</button>
        <button class = 'button' onclick="showPanel('four', this)">Four</button>
      </nav>
    </div>

    <br>
    <br>

    <div id="main_panel"><!--Main display panel-->
        
        <div id="one"> <!--Panel 1 contents-->
            <div class="chart_container"><canvas id="myChart"></canvas></div>
            <br>
            <div class="chart_container"><canvas id="myChart2"></canvas></div>
        </div>

        <div id="two" style="display:none"> <!--Panel 2 contents-->
            <div class="chart_container"><canvas id="myChart3"></canvas></div>
            <br>
            <div class="chart_container"><canvas id="myChart4"></canvas></div>
        </div>
        
        <div id="three" style="display:none"> <!--Panel 3 contents-->
            <div class="chart_container"><canvas id="myChart5"></canvas></div>
            <br>
            <div class="chart_container"><canvas id="myChart6"></canvas></div>
        </div>

        <div id="four" style="display:none"> <!--Panel 4 contents-->
            <div class="chart_container"><canvas id="myChart7"></canvas></div>
            <br>
            <div class="chart_container"><canvas id="myChart8"></canvas></div>
        </div>

  <script>
    //Function to reveal panels
    function showPanel(id, btn) {
      document.querySelectorAll('#main_panel > div').forEach(d => d.style.display = 'none');
      document.getElementById(id).style.display = 'block';

      Chart.instances.forEach(chart => chart.resize());
    }
  </script>

</html>
